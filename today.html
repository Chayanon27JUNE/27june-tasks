<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#111318">
<title>27JUNE TODAY CHECK LIST</title>
<style>
  :root{
    --bg:#14161b; --card:#1f232b; --ink:#f0efec; --muted:#8f929b; --line:#2b303a;
    --accent:#ff7d33;
    --red:rgba(224,49,49,.16); --red-line:#e03131;
    --yellow:rgba(250,176,5,.14); --yellow-line:#fab005;
    --green:rgba(47,158,68,.15); --green-line:#2f9e44;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans Thai",Sarabun,sans-serif}
  header{
    position:sticky; top:0; z-index:40; background:var(--bg); border-bottom:1px solid var(--line);
    padding:12px 14px 8px;
  }
  h1{font-size:17px; margin:0; letter-spacing:.3px}
  h1 b{color:var(--accent)}
  .sub{font-size:12px; color:var(--muted); margin-top:2px}
  /* legend */
  .legend{display:flex; gap:10px; margin-top:8px; font-size:11.5px; color:var(--muted); flex-wrap:wrap}
  .legend span{display:flex; align-items:center; gap:5px}
  .dot{width:9px; height:9px; border-radius:50%}
  /* board */
  .wrap{position:relative; overflow-x:hidden}
  .cols-head{display:flex; position:sticky; top:0; z-index:30}
  .board{
    position:relative; height:1200px; margin:0 6px 110px;
    border:1px solid var(--line); border-radius:12px; overflow:hidden; touch-action:pan-y;
  }
  .zone{position:absolute; left:0; right:0; pointer-events:none}
  .zone.red{background:var(--red); border-bottom:2px solid var(--red-line)}
  .zone.yellow{background:var(--yellow); border-bottom:2px solid var(--yellow-line)}
  .zone.green{background:var(--green)}
  .zone-label{
    position:absolute; left:8px; font-size:10.5px; font-weight:700; letter-spacing:.5px;
    padding:2px 8px; border-radius:999px; color:#fff; pointer-events:none; z-index:5;
  }
  .colline{position:absolute; top:0; bottom:0; width:1px; background:var(--line); pointer-events:none}
  .colhead{
    position:absolute; top:0; height:34px; display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:14px; letter-spacing:1.5px; z-index:6; pointer-events:none;
    width:33.333%; color:var(--ink); background:rgba(20,22,27,.82); backdrop-filter:blur(4px);
    border-bottom:1px solid var(--line);
  }
  /* dividers */
  .divider{
    position:absolute; left:0; right:0; height:26px; margin-top:-13px; z-index:20;
    display:flex; align-items:center; justify-content:center; touch-action:none; cursor:ns-resize;
  }
  .divider .pill{
    background:var(--card); border:1px solid var(--line); border-radius:999px;
    font-size:11px; color:var(--muted); padding:2px 12px;
  }
  /* cards */
  .tcard{
    position:absolute; width:calc(33.333% - 14px); min-height:46px; z-index:10;
    background:var(--card); border:1px solid var(--line); border-left:4px solid var(--muted);
    border-radius:10px; padding:8px 26px 8px 8px; touch-action:none; cursor:grab;
    box-shadow:0 2px 8px rgba(0,0,0,.35);
  }
  .tcard.dragging{opacity:.85; box-shadow:0 8px 22px rgba(0,0,0,.5); z-index:25; cursor:grabbing}
  .tcard .row{display:flex; gap:7px; align-items:flex-start}
  .cb{
    flex:0 0 auto; width:20px; height:20px; border-radius:6px; border:2px solid var(--muted);
    display:flex; align-items:center; justify-content:center; font-size:13px; color:#fff; margin-top:1px;
  }
  .tcard.done .cb{background:var(--green-line); border-color:var(--green-line)}
  .tcard .txt{font-size:13.5px; line-height:1.3; word-break:break-word}
  .tcard.done .txt{text-decoration:line-through; color:var(--muted)}
  .dots{
    position:absolute; top:4px; right:2px; border:none; background:none; color:var(--muted);
    font-size:16px; padding:4px 8px; cursor:pointer;
  }
  .menu{
    position:absolute; top:26px; right:4px; background:#262b34; border:1px solid var(--line);
    border-radius:8px; z-index:30; overflow:hidden;
  }
  .menu button{
    display:block; width:100%; border:none; background:none; color:#ff8787;
    font-size:13px; padding:8px 16px; cursor:pointer; font-family:inherit; white-space:nowrap;
  }
  /* fab + sheet */
  .fab{
    position:fixed; right:18px; bottom:18px; width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:#fff; font-size:28px; border:none; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.4); z-index:50; line-height:1;
  }
  .sheet-bg{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:60; display:none}
  .sheet-bg.open{display:block}
  .sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:61; background:var(--card);
    border-radius:18px 18px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom));
    transform:translateY(105%); transition:transform .2s ease;
  }
  .sheet.open{transform:translateY(0)}
  .sheet h2{font-size:16px; margin:0 0 10px}
  .sheet input{
    width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); color:var(--ink); font-size:16px; font-family:inherit; user-select:text; -webkit-user-select:text;
  }
  .opt-row{display:flex; gap:8px; margin-top:10px}
  .opt{
    flex:1; text-align:center; padding:9px 4px; border-radius:10px; border:1px solid var(--line);
    background:var(--bg); font-size:13.5px; cursor:pointer; font-weight:600;
  }
  .opt.sel{border-color:var(--accent); background:rgba(255,125,51,.12); color:var(--accent)}
  .opt.sel.r{border-color:var(--red-line); background:var(--red); color:#ff8787}
  .opt.sel.y{border-color:var(--yellow-line); background:var(--yellow); color:var(--yellow-line)}
  .opt.sel.g{border-color:var(--green-line); background:var(--green); color:#69db7c}
  .btn{
    width:100%; margin-top:14px; padding:13px; border-radius:12px; border:none;
    background:var(--accent); color:#fff; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit;
  }
</style>
</head>
<body>
<header>
  <h1>27<b>JUNE</b> TODAY CHECK LIST</h1>
  <div class="sub" id="sub"></div>
  <div class="legend">
    <span><i class="dot" style="background:var(--red-line)"></i>ด่วนมากๆ</span>
    <span><i class="dot" style="background:var(--yellow-line)"></i>ด่วน</span>
    <span><i class="dot" style="background:var(--green-line)"></i>ไม่ด่วน</span>
    <span style="opacity:.7">· ลากการ์ดวางได้อิสระ · ลากเส้นแบ่งเพื่อปรับโซน</span>
  </div>
</header>

<div class="wrap">
  <div class="board" id="board">
    <div class="zone red" id="zRed"></div>
    <div class="zone yellow" id="zYellow"></div>
    <div class="zone green" id="zGreen"></div>
    <div class="zone-label" id="lRed" style="background:var(--red-line)">ด่วนมากๆ 🔥</div>
    <div class="zone-label" id="lYellow" style="background:var(--yellow-line)">ด่วน ⚡</div>
    <div class="zone-label" id="lGreen" style="background:var(--green-line)">ไม่ด่วน 🌿</div>
    <div class="colline" style="left:33.333%"></div>
    <div class="colline" style="left:66.666%"></div>
    <div class="colhead" style="left:0">TITI</div>
    <div class="colhead" style="left:33.333%">NON</div>
    <div class="colhead" style="left:66.666%">MILL</div>
    <div class="divider" id="div1"><span class="pill">⇕</span></div>
    <div class="divider" id="div2"><span class="pill">⇕</span></div>
  </div>
</div>

<button class="fab" id="fab">+</button>
<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <h2>เพิ่มการ์ดงาน</h2>
  <input id="fTitle" placeholder="พิมพ์ชื่องาน...">
  <div class="opt-row" id="whoRow">
    <div class="opt" data-v="0">TITI</div>
    <div class="opt sel" data-v="1">NON</div>
    <div class="opt" data-v="2">MILL</div>
  </div>
  <div class="opt-row" id="urgRow">
    <div class="opt r" data-v="red">🔥 ด่วนมากๆ</div>
    <div class="opt sel y" data-v="yellow">⚡ ด่วน</div>
    <div class="opt g" data-v="green">🌿 ไม่ด่วน</div>
  </div>
  <button class="btn" id="fSave">วางการ์ดลงบอร์ด</button>
</div>

<script>
// ---------- storage (กันพังใน preview) ----------
const store=(()=>{try{const t='__t';localStorage.setItem(t,t);localStorage.removeItem(t);return localStorage}
catch(e){let m={};return{getItem:k=>(k in m?m[k]:null),setItem:(k,v)=>{m[k]=String(v)},removeItem:k=>{delete m[k]}}}})();
const KEY='june27_today_v1';

let state=load();
function load(){
  const raw=store.getItem(KEY);
  if(raw){try{return JSON.parse(raw)}catch(e){}}
  return {div1:30, div2:60, cards:[
    {id:'c1', title:'ตัวอย่าง: ตามใบเสนอราคาลูกค้า', who:1, x:34.5, y:8, done:false},
  ]};
}
function save(){store.setItem(KEY,JSON.stringify(state))}
const $=id=>document.getElementById(id);
const board=$('board');
const uid=()=>'c'+Math.random().toString(36).slice(2,9);

$('sub').textContent=new Date().toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

// ---------- zones ----------
function layoutZones(){
  const d1=state.div1, d2=state.div2;
  $('zRed').style.top='0'; $('zRed').style.height=d1+'%';
  $('zYellow').style.top=d1+'%'; $('zYellow').style.height=(d2-d1)+'%';
  $('zGreen').style.top=d2+'%'; $('zGreen').style.height=(100-d2)+'%';
  $('div1').style.top=d1+'%'; $('div2').style.top=d2+'%';
  $('lRed').style.top='40px';
  $('lYellow').style.top='calc('+d1+'% + 6px)';
  $('lGreen').style.top='calc('+d2+'% + 6px)';
}

// ---------- render cards ----------
function urgencyOf(y){return y<state.div1?'red':(y<state.div2?'yellow':'green')}
const URG_COLOR={red:'var(--red-line)',yellow:'var(--yellow-line)',green:'var(--green-line)'};

function render(){
  document.querySelectorAll('.tcard').forEach(e=>e.remove());
  state.cards.forEach(c=>board.appendChild(cardEl(c)));
  layoutZones();
}
function cardEl(c){
  const el=document.createElement('div');
  el.className='tcard'+(c.done?' done':'');
  el.style.left=c.x+'%'; el.style.top=c.y+'%';
  el.style.borderLeftColor=URG_COLOR[urgencyOf(c.y)];
  el.innerHTML='<div class="row"><div class="cb">'+(c.done?'✓':'')+'</div><div class="txt"></div></div>'+
    '<button class="dots">⋮</button>';
  el.querySelector('.txt').textContent=c.title;
  el.querySelector('.cb').addEventListener('pointerup',ev=>{
    if(el._moved) return;
    ev.stopPropagation(); c.done=!c.done; save(); render();
  });
  el.querySelector('.dots').addEventListener('click',ev=>{
    ev.stopPropagation();
    closeMenus();
    const m=document.createElement('div'); m.className='menu';
    const e2=document.createElement('button'); e2.textContent='✏️ แก้ไข'; e2.style.color='var(--ink)';
    e2.onclick=()=>{closeMenus(); openEdit(c);};
    const b=document.createElement('button'); b.textContent='🗑 ลบการ์ดนี้';
    b.onclick=()=>{state.cards=state.cards.filter(x=>x.id!==c.id); save(); render();};
    m.appendChild(e2); m.appendChild(b); el.appendChild(m);
  });
  attachDrag(el,c);
  return el;
}
function closeMenus(){document.querySelectorAll('.menu').forEach(m=>m.remove())}
document.addEventListener('pointerdown',e=>{if(!e.target.closest('.menu')&&!e.target.closest('.dots'))closeMenus()});

// ---------- drag cards ----------
function attachDrag(el,c){
  el.addEventListener('pointerdown',e=>{
    if(e.target.closest('.dots')||e.target.closest('.menu')||e.target.closest('.cb'))return;
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    el._moved=false;
    const r=board.getBoundingClientRect();
    const startX=e.clientX, startY=e.clientY, ox=c.x, oy=c.y;
    const move=ev=>{
      const dx=(ev.clientX-startX)/r.width*100, dy=(ev.clientY-startY)/r.height*100;
      if(Math.abs(ev.clientX-startX)+Math.abs(ev.clientY-startY)>6){el._moved=true; el.classList.add('dragging')}
      c.x=Math.min(Math.max(ox+dx,.5),66.5);
      c.y=Math.min(Math.max(oy+dy,3.2),96);
      el.style.left=c.x+'%'; el.style.top=c.y+'%';
      el.style.borderLeftColor=URG_COLOR[urgencyOf(c.y)];
    };
    const up=()=>{
      el.classList.remove('dragging');
      el.removeEventListener('pointermove',move);
      el.removeEventListener('pointerup',up);
      if(el._moved) save();
      setTimeout(()=>{el._moved=false},50);
    };
    el.addEventListener('pointermove',move);
    el.addEventListener('pointerup',up);
  });
}

// ---------- drag dividers ----------
function attachDivider(el,key,minF,maxF){
  el.addEventListener('pointerdown',e=>{
    e.preventDefault(); el.setPointerCapture(e.pointerId);
    const r=board.getBoundingClientRect();
    const move=ev=>{
      let p=(ev.clientY-r.top)/r.height*100;
      p=Math.min(Math.max(p,minF()),maxF());
      state[key]=Math.round(p*10)/10; layoutZones();
      document.querySelectorAll('.tcard').forEach((elc,i)=>{
        elc.style.borderLeftColor=URG_COLOR[urgencyOf(state.cards[i].y)];
      });
    };
    const up=()=>{save(); el.removeEventListener('pointermove',move); el.removeEventListener('pointerup',up)};
    el.addEventListener('pointermove',move);
    el.addEventListener('pointerup',up);
  });
}
attachDivider($('div1'),'div1',()=>8,()=>state.div2-8);
attachDivider($('div2'),'div2',()=>state.div1+8,()=>94);

// ---------- add / edit sheet ----------
let selWho=1, selUrg='yellow', editingId=null;
function setSel(row,val){
  $(row).querySelectorAll('.opt').forEach(x=>x.classList.toggle('sel', String(x.dataset.v)===String(val)));
}
function colOf(x){return Math.min(2,Math.max(0,Math.floor((x+16.6)/33.333)))}
function openEdit(c){
  editingId=c.id;
  $('fTitle').value=c.title;
  selWho=colOf(c.x); selUrg=urgencyOf(c.y);
  setSel('whoRow',selWho); setSel('urgRow',selUrg);
  document.querySelector('.sheet h2').textContent='แก้ไขการ์ด';
  $('fSave').textContent='บันทึกการแก้ไข';
  $('sheet').classList.add('open'); $('sheetBg').classList.add('open');
}
$('whoRow').querySelectorAll('.opt').forEach(o=>o.onclick=()=>{
  $('whoRow').querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
  o.classList.add('sel'); selWho=+o.dataset.v;
});
$('urgRow').querySelectorAll('.opt').forEach(o=>o.onclick=()=>{
  $('urgRow').querySelectorAll('.opt').forEach(x=>x.classList.remove('sel'));
  o.classList.add('sel'); selUrg=o.dataset.v;
});
$('fab').onclick=()=>{
  editingId=null;
  document.querySelector('.sheet h2').textContent='เพิ่มการ์ดงาน';
  $('fSave').textContent='วางการ์ดลงบอร์ด';
  $('sheet').classList.add('open');$('sheetBg').classList.add('open');
  setTimeout(()=>$('fTitle').focus(),250)
};
$('sheetBg').onclick=()=>{$('sheet').classList.remove('open');$('sheetBg').classList.remove('open')};
function zoneSpawn(){
  const zoneTop = selUrg==='red'?4:(selUrg==='yellow'?state.div1+2:state.div2+2);
  const inZone=state.cards.filter(c=>urgencyOf(c.y)===selUrg && colOf(c.x)===selWho).length;
  return {x:selWho*33.333+1.2, y:Math.min(zoneTop+inZone*6,95)};
}
$('fSave').onclick=()=>{
  const t=$('fTitle').value.trim();
  if(!t)return;
  if(editingId){
    const c=state.cards.find(x=>x.id===editingId);
    if(c){
      c.title=t;
      // ย้ายเฉพาะเมื่อเปลี่ยนคนหรือความด่วน
      if(colOf(c.x)!==selWho || urgencyOf(c.y)!==selUrg){
        const p=zoneSpawn(); c.x=p.x; c.y=p.y; c.who=selWho;
      }
    }
    editingId=null;
  }else{
    const p=zoneSpawn();
    state.cards.push({id:uid(), title:t, who:selWho, x:p.x, y:p.y, done:false});
  }
  save(); $('fTitle').value='';
  $('sheet').classList.remove('open'); $('sheetBg').classList.remove('open');
  render();
};

render();
</script>
</body>
</html>
